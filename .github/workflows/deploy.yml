name: Deploy a GitHub Pages

# Deploya la app a GitHub Pages en cada push a main.
#
# PASO MANUAL UNICO (una sola vez): en el repo, ir a
#   Settings > Pages > Source = "GitHub Actions".
# La organizacion no permite que el workflow habilite Pages por API
# (el token da "Resource not accessible by integration"), asi que hay que
# activarlo a mano esa primera vez. Despues, cada push a main publica solo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # base absoluto para el subpath de GitHub Pages (/2gtech3d-lead-radar/).
      - run: npm run build
        env:
          VITE_BASE: /2gtech3d-lead-radar/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

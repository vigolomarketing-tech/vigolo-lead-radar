name: Deploy a GitHub Pages

# Deploya la app a GitHub Pages en cada push a main.
# El propio workflow habilita Pages (source = GitHub Actions) via
# actions/configure-pages con enablement: true, asi no hace falta tocar
# la UI. Si la org bloquea esa habilitacion automatica, activarlo a mano en
# Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Habilita Pages con source = GitHub Actions (si aun no lo estaba).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
